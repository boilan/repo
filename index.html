<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal de Juegos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: #020617;
      padding: 10px;
      overflow-y: auto;
      border-right: 2px solid #1e293b;
    }

    .game {
      background: #1e293b;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .game:hover {
      background: #334155;
    }

    /* Main */
    .main {
      flex: 1;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #94a3b8;
      font-size: 24px;
    }

    header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      z-index: 10;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>🎮 Juegos</h3>

    <div class="game" onclick="loadGame('https://gamecollections.me/game/3kh0-assets-main/crossyroad/')">
      🚗 Crossy Road (Space)
    </div>

    <div class="game" onclick="loadGame('https://crossy-road.gitlab.io/file/')">
      🐔 Crossy Road (Original)
    </div>

  </div>

  <!-- Main -->
  <div class="main">
    <div class="placeholder" id="placeholder">
      Selecciona un juego 👈
    </div>

    <iframe id="frame" style="display:none;"></iframe>
  </div>

  <script>
    function loadGame(url) {
      const frame = document.getElementById("frame");
      const placeholder = document.getElementById("placeholder");

      frame.src = url;
      frame.style.display = "block";
      placeholder.style.display = "none";
    }
  </script>

</body>
</html>
