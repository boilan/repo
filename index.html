<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal de Juegos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #020617;
      padding: 10px;
      overflow-y: auto;
      border-right: 2px solid #1e293b;
    }

    .game {
      background: #1e293b;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .game:hover {
      background: #334155;
    }

    .active {
      background: #475569 !important;
    }

    .main {
      flex: 1;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #94a3b8;
      font-size: 24px;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>🎮 Modos</h3>

    <div class="game" onclick="loadGame(event, 'https://gamecollections.me/game/3kh0-assets-main/crossyroad/')">
      🚗 Space Mode
    </div>

    <div class="game" onclick="loadGame(event, 'https://crossy-road.gitlab.io/file/')">
      🐔 Original Mode
    </div>

    <div class="game" onclick="loadGame(event, 'https://crossyroadgame.io/crossy-road-game.embed')">
      🎲 Random Mode
    </div>

  </div>

  <!-- Main -->
  <div class="main">
    <div class="placeholder" id="placeholder">
      Selecciona un modo 👈
    </div>

    <iframe id="frame" style="display:none;"></iframe>
  </div>

  <script>
    function loadGame(event, url) {
      const frame = document.getElementById("frame");
      const placeholder = document.getElementById("placeholder");

      frame.src = url;
      frame.style.display = "block";
      placeholder.style.display = "none";

      // resaltar activo
      document.querySelectorAll('.game').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }
  </script>

</body>
</html>
